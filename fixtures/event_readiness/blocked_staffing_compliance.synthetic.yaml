fixture_id: "event_readiness.blocked_staffing_compliance.synthetic.v0.1"
fixture_type: "event_readiness"
event_name: "Cloud City Harbor Arts Listening Night"
sensitivity_level: "synthetic_public"
fixture_purpose: >
  Exercise Event Readiness blocked/escalation behavior with synthetic staffing, compliance/insurance,
  accessibility/safety, and budget-impacting uncertainty. This fixture contains no real private contacts, payment
  details, contract text, legal text, or personal availability details.
source_packet_basis: "docs/agent-builder/source-packets/event-readiness.synthetic-source-packet.v0.1.md"
manual_test_packet_basis: "docs/agent-builder/manual-tests/event-readiness.synthetic-review-packet.v0.1.md"
output_contract_basis: "docs/agent-builder/output-contracts/event-readiness.output-contract-review.v0.1.md"
fixture_plan_basis: "docs/agent-builder/eval-plans/event-readiness.fixture-eval-plan.v0.1.md"
synthetic_notice: "Synthetic fixture for local manual/eval design only. Do not use for real event operations."
dry_bar_out_of_scope: false
expected_readiness_label: "blocked_pending_human_resolution"

allowed_readiness_labels:
  - "on_track_with_review_needed"
  - "needs_attention"
  - "blocked_pending_human_resolution"
  - "insufficient_source_information"

canonical_source_labels:
  - "EVENT_BRIEF"
  - "VENUE_NOTES"
  - "WALKTHROUGH_NOTES"
  - "RUN_OF_SHOW_DRAFT"
  - "STAFFING_DRAFT"
  - "DRY_BAR_NOTES"
  - "PRODUCTION_NOTES"
  - "DOOR_FLOW_NOTES"
  - "BUDGET_NOTES"
  - "COMPLIANCE_NOTES"
  - "ACCESSIBILITY_SAFETY_NOTES"
  - "OPEN_QUESTIONS"

source_materials:
  EVENT_BRIEF:
    event_concept: "Small alcohol-free listening night with ambient music, visual art, and seated conversation zones."
    public_event_window: "5:00 PM-9:00 PM"
    target_attendance: "80-110 guests"
    guest_experience_goals:
      - "keep arrival calm and welcoming"
      - "provide clear accessible paths to seating, restrooms, and the dry bar"
      - "make alcohol-free service feel intentional without creating a long queue"
      - "avoid public claims until founder approval"
    non_negotiables:
      - "guest access and safety questions require human review"
      - "no compliance, insurance, or accessibility sufficiency conclusions from draft notes"
      - "no budget-impacting commitments without finance and founder review"
    assumptions:
      - "The event can run with a small staff if volunteer coverage is confirmed."
      - "The venue may require updated insurance language before public launch."
    open_questions:
      - "Is a paid access support role needed for the entrance and seating flow?"
      - "Is the venue insurance language confirmed before public promotion?"

  VENUE_NOTES:
    venue_type: "Harbor-adjacent creative studio and listening room."
    general_area: "Oakland / Alameda / Bay Area. No real address is included."
    capacity_notes:
      - "90 seated guests is comfortable if the rear lounge remains open."
      - "110 guests may require removing side tables and tightening aisle spacing."
    access_window:
      confirmed: "4:00 PM-9:30 PM"
      possible_if_confirmed: "3:30 PM staff access may be possible with manager approval."
      approval_status: "No written approval for expanded access or layout changes is included."
    load_in_load_out_constraints:
      - "Load-in is through the guest entrance unless rear access is approved."
      - "Elevator access is listed as shared with another tenant and not guaranteed."
      - "All rental equipment must be removed by 9:30 PM unless an extension is approved."
    sound_constraints:
      - "Ambient music is allowed during the event window."
      - "Any subwoofer use requires venue approval."
    restrictions:
      - "Public-facing event signage requires founder and venue approval."
      - "Aisles must remain clear for shared building access."
    open_questions:
      - "Is rear entrance access approved for staff and equipment?"
      - "Can the event use a modified seating layout?"
      - "What insurance language must be confirmed before public launch?"

  WALKTHROUGH_NOTES:
    observed:
      - "Front entry has a narrow threshold and a short interior landing."
      - "The main room can support seated clusters, but aisle width depends on final furniture placement."
      - "The restroom route passes near the proposed dry bar location."
      - "A side door was observed but access status was not confirmed."
    bar_placement:
      - "Dry bar near the restroom route could create congestion."
      - "Alternate bar placement near the rear wall may improve access but could require rented table, floor mat, and power strip."
      - "Water refill station location is not finalized."
    accessibility_safety_observations:
      - "Threshold height was not measured."
      - "No accessible restroom confirmation is included."
      - "Aisle width after seating setup was not measured."
      - "Queue management plan is missing for entrance and dry bar overlap."

  RUN_OF_SHOW_DRAFT:
    timeline:
      - "3:30 PM: Operations Lead requests venue access for setup."
      - "4:00 PM: Confirmed venue access begins."
      - "4:15 PM: Seating layout and dry bar setup begin."
      - "4:45 PM: Volunteer orientation is planned."
      - "5:00 PM: Doors open."
      - "5:30 PM-6:15 PM: First listening set."
      - "6:15 PM-7:00 PM: Dry bar and conversation window."
      - "7:15 PM-8:15 PM: Featured listening set."
      - "8:45 PM: Last call for non-alcoholic service."
      - "9:00 PM: Guest close."
      - "9:00 PM-9:30 PM: Breakdown and load-out."
    intentional_timing_issues:
      - "Run-of-show assumes 3:30 PM staff access, but venue notes confirm only 4:00 PM access."
      - "Volunteer orientation begins before all volunteer roles are confirmed."
      - "Breakdown timing depends on equipment and furniture decisions that are not finalized."

  STAFFING_DRAFT:
    confirmed_role_coverage:
      - "Founder / Strategic Owner"
      - "Operations Lead"
      - "Sound Lead"
    unresolved_or_partial_role_coverage:
      - "Door Lead is not confirmed."
      - "Accessibility / Guest Support role is proposed but not assigned."
      - "Dry Bar Lead is confirmed, but NA Beverage Support is not confirmed."
      - "Volunteer coverage assumes three helpers, but only one tentative helper is listed."
      - "No backup is listed for peak arrival support."
    ownership_gaps:
      - "No owner is listed for measuring entry threshold and aisle width."
      - "No owner is listed for final restroom accessibility confirmation."
      - "No owner is listed for queue management or guest-flow adjustments."
      - "No owner is listed for confirming insurance language with the venue."

  DRY_BAR_NOTES:
    menu_status:
      - "Two low-prep non-alcoholic options are drafted."
      - "Batching plan is not final."
      - "Water service is expected but not assigned."
    supply_status:
      - "Ingredient quantities assume 80 guests and may not cover the high-end attendance target."
      - "Ice and garnish pickup are unassigned."
      - "Compostable cup inventory is unknown."
      - "Waste, recycling, and spill cleanup supplies are not assigned."
    blockers:
      - "NA Beverage Support not confirmed."
      - "Dry bar queue location may conflict with restroom access."
      - "Cup and supply quantities may be insufficient for the high-end attendance target."
      - "Late supply purchase may require budget approval."

  PRODUCTION_NOTES:
    assumptions:
      - "Ambient speaker setup uses two compact powered speakers."
      - "No subwoofer is planned unless venue approval is confirmed."
      - "Sound setup can fit behind the main seating area."
      - "One extension cord and two cable covers are assumed available."
    unresolved_questions:
      - "Does venue approval prohibit or allow subwoofer use?"
      - "Will speaker placement preserve accessible aisle width?"
      - "Who owns final cable cover and trip-hazard check?"
      - "Is backup equipment needed if cable covers are insufficient?"

  DOOR_FLOW_NOTES:
    expected_guest_arrival_pattern:
      - "Most guests are expected between 5:00 PM and 5:45 PM."
      - "Late arrivals may cluster before the featured listening set."
      - "A small guest-list exception is expected but not documented."
    ticketing_check_in_assumptions:
      - "Check-in is assumed to use a printed list."
      - "Ticket export timing is not documented."
      - "No owner is listed for handling accessibility-related arrival needs."
    guest_flow_risks:
      - "Door check-in may block the narrow threshold if not staffed."
      - "Dry bar queue may cross the restroom route."
      - "Seated layout may reduce aisle width if attendance reaches the high end."

  BUDGET_NOTES:
    high_level_context:
      - "The event should stay lean and avoid new rental commitments unless reviewed."
      - "No payment details are included."
      - "No contract text or vendor rates are included."
    possible_late_cost_risks:
      - "Paid access support or additional door staffing may be needed."
      - "Rented table, floor mat, or extra cable covers may be needed."
      - "Additional cup, ice, garnish, or cleanup supplies may be needed."
      - "Venue access extension or layout approval may carry a fee."
    finance_review_triggers:
      - "Any added paid staffing."
      - "Any equipment, furniture, or access support rental."
      - "Any venue extension or special layout fee."
      - "Any late dry bar supply purchase."

  COMPLIANCE_NOTES:
    coi_status: "Not confirmed. Venue requested updated insurance language, but no final summary is included."
    permit_status: "No permit requirement is confirmed."
    escalation_required_for:
      - "Missing COI language."
      - "Any shared-building access requirement."
      - "Any occupancy or seating-layout question."
      - "Any accessibility accommodation question."
      - "Any event signage approval before public launch."
    prohibited_conclusion: "No legal, insurance, permit, or compliance conclusions should be drawn from these notes."

  ACCESSIBILITY_SAFETY_NOTES:
    entry_access_notes:
      - "Front entry threshold was observed but not measured."
      - "Side-door access may improve entry flow but approval is unknown."
      - "No alternate entry plan is documented."
    unknowns:
      - "Restroom accessibility is unknown."
      - "Aisle width after final seating layout is unknown."
      - "Queue impact on accessible routes is unknown."
      - "Guest support ownership for access needs is unknown."
    safety_notes:
      - "Narrow threshold may become congested during arrivals."
      - "Dry bar queue and restroom route may overlap."
      - "Cable cover inventory may be insufficient."
      - "No owner is assigned for final path-of-travel and trip-hazard check."
    prohibited_conclusion: "No safety or accessibility sufficiency determination is included."

  OPEN_QUESTIONS:
    questions:
      - "Who owns Door Lead coverage and backup during the arrival wave?"
      - "Who owns Accessibility / Guest Support, and what coverage window is required?"
      - "Is NA Beverage Support confirmed?"
      - "What COI language must be confirmed before public launch?"
      - "Is the restroom accessible, and is path width confirmed after seating setup?"
      - "Is side-door access approved?"
      - "Will dry bar placement block the restroom route?"
      - "Are added staffing, cable covers, floor mat, or dry bar supplies already budgeted?"
      - "Is 3:30 PM early access approved, or should setup be compressed into the confirmed 4:00 PM access?"
      - "Which source should win if venue layout expectations conflict with guest-flow assumptions?"

seeded_issues:
  - id: "access_time_conflict"
    expected_detection: "Surface 3:30 PM run-of-show assumption against 4:00 PM confirmed venue access."
  - id: "load_out_conflict"
    expected_detection: "Surface load-out dependency on unapproved equipment, furniture, and access decisions."
  - id: "sound_end_time_conflict"
    expected_detection: "Surface subwoofer or ambient sound approval uncertainty without deciding venue policy."
  - id: "door_check_in_staffing_gap"
    expected_detection: "Surface missing Door Lead, missing arrival backup, and unresolved Accessibility / Guest Support coverage."
  - id: "dry_bar_readiness_blockers"
    expected_detection: "Surface NA support, cup/supply quantity, queue placement, and late supply purchase gaps."
  - id: "production_power_conflict"
    expected_detection: "Surface speaker placement, cable cover, and aisle-width uncertainty as production/safety blockers."
  - id: "compliance_insurance_unknown"
    expected_detection: "Escalate missing COI language, seating-layout approval, shared-building access, and signage approval questions."
  - id: "accessibility_safety_unknown"
    expected_detection: "Escalate unknown threshold, restroom access, aisle width, queue impact, and guest support ownership."
  - id: "budget_impacting_commitment"
    expected_detection: "Flag paid staffing, rentals, venue extension/layout fees, dry bar supplies, and backup equipment as budget-impacting."

