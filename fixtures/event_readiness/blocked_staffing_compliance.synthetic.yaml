  - "event_name"
  - "source_packet_id_or_path"
  - "packet_type"
  - "draft_status"
  - "readiness_label"
  - "sources_used"
  - "confirmed_facts"
  - "assumptions"
  - "unknowns"
  - "source_conflicts"
  - "risk_notes"
  - "approval_needs"
  - "recommended_next_human_review_step"
  - "human_review_required_before_action"

required_domain_check_sections:
