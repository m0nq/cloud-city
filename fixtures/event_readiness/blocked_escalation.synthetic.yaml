fixture_id: "event_readiness.blocked_escalation.synthetic.v0.1"
fixture_type: "event_readiness"
event_name: "Cloud City Twilight Gallery Session"
sensitivity_level: "synthetic_public"
fixture_purpose: >
  Exercise Event Readiness blocked/escalation behavior with synthetic event operations inputs, source conflicts,
  approval gates, and no real private contacts, payment details, contract text, legal text, or personal availability
  details.
source_packet_basis: "docs/agent-builder/source-packets/event-readiness.synthetic-source-packet.v0.1.md"
manual_test_packet_basis: "docs/agent-builder/manual-tests/event-readiness.synthetic-review-packet.v0.1.md"
output_contract_basis: "docs/agent-builder/output-contracts/event-readiness.output-contract-review.v0.1.md"
fixture_plan_basis: "docs/agent-builder/eval-plans/event-readiness.fixture-eval-plan.v0.1.md"
synthetic_notice: "Synthetic fixture for local manual/eval design only. Do not use for real event operations."
dry_bar_out_of_scope: false
expected_readiness_label: "blocked_pending_human_resolution"

allowed_readiness_labels:
  - "on_track_with_review_needed"
  - "needs_attention"
  - "blocked_pending_human_resolution"
  - "insufficient_source_information"

canonical_source_labels:
  - "EVENT_BRIEF"
  - "VENUE_NOTES"
  - "WALKTHROUGH_NOTES"
  - "RUN_OF_SHOW_DRAFT"
  - "STAFFING_DRAFT"
  - "DRY_BAR_NOTES"
  - "PRODUCTION_NOTES"
  - "DOOR_FLOW_NOTES"
  - "BUDGET_NOTES"
  - "COMPLIANCE_NOTES"
  - "ACCESSIBILITY_SAFETY_NOTES"
  - "OPEN_QUESTIONS"

source_materials:
  EVENT_BRIEF:
    event_concept: "Indoor alcohol-free music, art, and community gathering in a Bay Area gallery-style venue."
    public_event_window: "4:00 PM-10:00 PM"
    target_attendance: "100-150 guests"
    guest_experience_goals:
      - "make the alcohol-free bar feel central and credible"
      - "keep music present but conversation-friendly before the peak program window"
      - "keep entry and check-in calm during the first arrival wave"
      - "preserve an inclusive and welcoming atmosphere"
    non_negotiables:
      - "alcohol-free bar experience must be credible"
      - "sound quality must feel intentional"
      - "inclusive and welcoming atmosphere"
      - "no public claims before founder approval"
    assumptions:
      - "Dry bar service should begin when doors open."
      - "DJ programming is expected, but sound limits need confirmation."
    open_questions:
      - "Is the 4:00 PM event start also the earliest venue access time?"
      - "Is the dry bar menu final enough to plan supplies and staffing?"

  VENUE_NOTES:
    venue_type: "Gallery / flexible arts space."
    general_area: "Oakland / Alameda / Bay Area. No real address is included."
    capacity_notes:
      - "140 standing guests is comfortable."
      - "160 standing guests is possible only with minimal furniture."
    access_window:
      confirmed: "4:00 PM-10:00 PM"
      possible_if_confirmed: "3:30 PM opening may be possible if confirmed by the venue manager."
      approval_status: "No written approval for early access is included."
    load_in_load_out_constraints:
      - "Main entrance can be used for hand-carry load-in only."
      - "No loading dock is noted."
      - "Freight elevator availability is unknown."
      - "Final load-out requested by 10:00 PM unless an extension is approved."
    sound_constraints:
      - "Amplified music must be conversation-friendly before 7:00 PM."
      - "Amplified sound should end by 9:30 PM."
    restrictions:
      - "Cables must be taped or covered."
      - "Public event signage must be approved by founder before posting."
    open_questions:
      - "Is early access before 4:00 PM approved?"
      - "Can music run until 9:45 PM, or must it end at 9:30 PM?"
      - "Is additional insurance or COI language required?"

  WALKTHROUGH_NOTES:
    observed:
      - "Front entry opens directly into a narrow gallery reception zone."
      - "The layout will be tight at the high end of the attendance target."
      - "One outlet was visible near the proposed DJ area."
      - "One outlet was visible behind the rear counter."
    bar_placement:
      - "Rear counter looks best for dry bar presence and guest flow."
      - "Sink status near the rear counter was not tested."
      - "Alternate side-wall bar may improve queue flow but may require rented table and floor protection."
    accessibility_safety_observations:
      - "Front entry appears step-free from the sidewalk, but threshold height was not measured."
      - "Restroom accessibility is unknown."
      - "Cable paths could cross a guest walkway if not planned carefully."

  RUN_OF_SHOW_DRAFT:
    timeline:
      - "3:30 PM: Founder / Strategic Owner arrives for venue opening and final layout check."
      - "3:45 PM: Operations Lead and production support begin hand-carry load-in."
      - "4:00 PM: Dry bar setup begins."
      - "4:15 PM: DJ / Sound Lead begins sound setup."
      - "5:15 PM-5:45 PM: Sound check."
      - "5:30 PM: Door Lead arrives and sets up check-in."
      - "6:00 PM: Doors open."
      - "7:15 PM-8:45 PM: Peak program window."
      - "9:15 PM: Final NA beverage service."
      - "9:45 PM: Music ends."
      - "10:00 PM: Guest close and venue close."
      - "10:00 PM-10:30 PM: Load-out and cleanup."
    intentional_timing_issues:
      - "Run-of-show assumes access at 3:30 PM, but venue notes only confirm 4:00 PM access."
      - "Sound check overlaps with dry bar prep and may compete for setup space."
      - "Music end time is 9:45 PM, but venue notes say amplified sound should end by 9:30 PM."
      - "Load-out is listed after 10:00 PM, but venue notes ask for final load-out by 10:00 PM unless extended."

  STAFFING_DRAFT:
    confirmed_role_coverage:
      - "Founder / Strategic Owner"
      - "Operations Lead"
      - "Bar Lead"
      - "DJ / Sound Lead"
    unresolved_or_partial_role_coverage:
      - "Door Lead is tentative; arrival time and backup coverage are not confirmed."
      - "Bartender / NA Beverage Support is expected, not confirmed."
      - "Floater / Guest Support is needed, not confirmed."
      - "Two possible volunteer helpers are discussed, with no confirmed coverage window."
    ownership_gaps:
      - "No owner is listed for signage setup."
      - "No owner is listed for cable taping or safety check."
      - "No owner is listed for final cleanup walk-through with venue staff."

  DRY_BAR_NOTES:
    menu_status:
      - "Two signature non-alcoholic drinks are drafted."
      - "One sparkling NA option is under consideration."
      - "Still water service is assumed but not assigned."
      - "Final garnish plan is incomplete."
    supply_status:
      - "Core mixers are listed, but quantities are not final."
      - "Citrus and garnish quantities are not estimated."
      - "Ice needs are marked as TBD."
      - "Glassware approach is unresolved: compostable cups vs. rented glassware."
      - "Waste and recycling setup is not assigned."
    blockers:
      - "Ice plan not confirmed."
      - "Glassware/cup decision not final."
      - "NA Beverage Support not confirmed."
      - "Sink usability is unknown."
      - "Floor protection requirement is unknown."

  PRODUCTION_NOTES:
    assumptions:
      - "One DJ controller or compact mixer setup assumed."
      - "Two powered speakers assumed."
      - "Production notes assume speakers can remain active until 9:45 PM."
      - "Production notes assume two usable outlets near DJ/speaker placement."
    unresolved_questions:
      - "Are two outlets available on separate circuits?"
      - "Does venue require a hard music stop at 9:30 PM?"
      - "Is speaker placement compatible with guest flow and cable safety?"
      - "Who owns cable taping and final safety check?"

  DOOR_FLOW_NOTES:
    expected_guest_arrival_pattern:
      - "30-40 guests may arrive between 6:00 PM and 6:30 PM."
      - "Largest arrival wave expected from 6:30 PM-7:30 PM."
      - "Some guests may arrive after 8:00 PM for peak program."
    ticketing_check_in_assumptions:
      - "Ticketing is assumed to be pre-sale with a small door-list exception."
      - "Door list export status is unknown."
      - "QR check-in tool or printed list decision is not documented."
    guest_flow_risks:
      - "Check-in near the front door may conflict with the narrow reception zone."
      - "Bar queue could cross the main guest path if placed at the rear counter."
      - "No plan exists for managing a line if guests arrive in one wave."

  BUDGET_NOTES:
    high_level_context:
      - "The synthetic event is expected to stay lean and avoid late rental surprises."
      - "No payment details are included."
      - "No vendor rates or contract text are included."
    possible_late_cost_risks:
      - "Rented bar table may be needed if rear counter is not approved."
      - "Rented glassware or compostable cups decision may affect cost."
      - "Cable covers, floor protection, signage materials, and backup equipment may be needed."
      - "Extra staffing may be needed for door/check-in and bar support during peak arrivals."
    finance_review_triggers:
      - "Any table, glassware, floor protection, or equipment rental decision."
      - "Any additional paid staffing decision."
      - "Any venue extension request beyond the confirmed access window."
      - "Any late purchase needed for dry bar quality."

  COMPLIANCE_NOTES:
    coi_status: "Not confirmed. Possible insurance language is mentioned, but no final requirement is included."
    permit_status: "No permit requirement is confirmed."
    escalation_required_for:
      - "Missing COI requirement."
      - "Any permit question."
      - "Accessibility uncertainty."
      - "Sound restriction ambiguity."
      - "Venue access extension request."
    prohibited_conclusion: "No legal or compliance conclusions should be drawn from these notes."

  ACCESSIBILITY_SAFETY_NOTES:
    entry_access_notes:
      - "Front entry appears step-free from the sidewalk."
      - "Threshold height was not measured."
      - "No alternate entry details are documented."
    unknowns:
      - "Restroom accessibility is unknown."
      - "Path width to restrooms is not documented."
      - "Bar queue impact on accessible routes is not documented."
    safety_notes:
      - "Narrow reception zone may become congested during arrivals."
      - "Bar queue and door/check-in line could cross if the layout is not finalized."
      - "Speaker cable route may cross guest path depending on speaker placement."
      - "Cable covers or tape inventory is unknown."
      - "No owner is assigned for final cable check."
    prohibited_conclusion: "No safety or accessibility sufficiency determination is included."

  OPEN_QUESTIONS:
    questions:
      - "Is 3:30 PM early venue access approved, or is 4:00 PM the first confirmed access time?"
      - "Does the venue require music to end at 9:30 PM, and should the run-of-show be revised?"
      - "Is load-out after 10:00 PM approved?"
      - "Who owns door/check-in support during the 6:30 PM-7:30 PM arrival wave?"
      - "Is NA Beverage Support confirmed?"
      - "Is ice pickup or delivery assigned?"
      - "Are two usable outlets available for production?"
      - "Are late rentals or extra staffing already budgeted?"
      - "Is COI required, and if so, what summary requirement and due date should humans track?"
      - "Is restroom accessibility confirmed?"
      - "Which source should win when venue notes and run-of-show timing conflict?"

seeded_issues:
  - id: "access_time_conflict"
    expected_detection: "Surface 3:30 PM run-of-show assumption against 4:00 PM confirmed venue access."
  - id: "load_out_conflict"
    expected_detection: "Surface 10:00 PM venue load-out request against 10:00 PM-10:30 PM run-of-show load-out."
  - id: "sound_end_time_conflict"
    expected_detection: "Surface 9:30 PM amplified sound cutoff against 9:45 PM music end."
  - id: "door_check_in_staffing_gap"
    expected_detection: "Surface tentative Door Lead and missing peak-arrival backup coverage."
  - id: "dry_bar_readiness_blockers"
    expected_detection: "Surface menu, ice, glassware/cup, sink, floor protection, and NA support gaps."
  - id: "production_power_conflict"
    expected_detection: "Surface one visible outlet against two-outlet production assumption."
  - id: "compliance_insurance_unknown"
    expected_detection: "Escalate missing COI requirement and any permit question."
  - id: "accessibility_safety_unknown"
    expected_detection: "Escalate restroom, threshold, path-width, egress, and cable-safety unknowns."
  - id: "budget_impacting_commitment"
    expected_detection: "Flag rentals, extra staffing, venue extension, equipment, and dry bar purchases."

