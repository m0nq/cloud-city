name: CI/CD Pipeline
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Runs on pushes targeting the default branch
  push:
    branches: [ 'main' ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    name: Build Site 🛠️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Run linter
        run: pnpm lint

      - name: Set Environment Variables
        env:
          CC_API_KEY: ${{ secrets.CC_API_KEY }}
          WORDPRESS_API_URL: ${{ secrets.WORDPRESS_API_URL }}
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
        run: |
          echo "" > .env.production
          echo CC_API_KEY="$CC_API_KEY" >> .env.production
          echo WORDPRESS_API_URL="$WORDPRESS_API_URL" >> .env.production
          echo GA4_MEASUREMENT_ID="$GA4_MEASUREMENT_ID" >> .env.production

      - name: Build with Next.js
        run: pnpm build

  test:
    name: Unit Tests 🧪
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests with coverage
        run: pnpm test:coverage

  # Deployment job
  deploy:
    name: Deploy 🚀
    needs: [ build, test ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.CC_VERCEL_TOKEN }}

      - name: Set Environment Variables
        env:
          CC_API_KEY: ${{ secrets.CC_API_KEY }}
          WORDPRESS_API_URL: ${{ secrets.WORDPRESS_API_URL }}
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
        run: |
          echo "" > .env.production
          echo CC_API_KEY="$CC_API_KEY" >> .env.production
          echo WORDPRESS_API_URL="$WORDPRESS_API_URL" >> .env.production
          echo GA4_MEASUREMENT_ID="$GA4_MEASUREMENT_ID" >> .env.production

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.CC_VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.CC_VERCEL_TOKEN }}
