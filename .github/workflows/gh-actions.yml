name: CI/CD Pipeline
env:
  PNPM_CACHE_DEPENDENCY_PATH: pnpm-lock.yaml
  VERCEL_CLI_VERSION: 51.8.0

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Grant the workflow the minimum token scope it needs.
permissions:
  contents: read

# Allow only one concurrent deployment, skipping runs queued between the run in progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: production-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    name: Build Site 🛠️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          pnpm config set store-dir ~/.pnpm-store
          pnpm --version

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pnpm-store
          key:
            ${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-pnpm-store-${{ hashFiles(env.PNPM_CACHE_DEPENDENCY_PATH) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-pnpm-store-
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Build with Next.js
        env:
          CC_API_KEY: ${{ secrets.CC_API_KEY }}
          WORDPRESS_API_URL: ${{ secrets.WORDPRESS_API_URL }}
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
        run: pnpm build

  test:
    name: Unit Tests 🧪
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          pnpm config set store-dir ~/.pnpm-store
          pnpm --version

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pnpm-store
          key:
            ${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-pnpm-store-${{ hashFiles(env.PNPM_CACHE_DEPENDENCY_PATH) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-pnpm-store-
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:coverage

  # Deployment job
  deploy:
    name: Deploy 🚀
    needs: [build, test]
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          pnpm config set store-dir ~/.pnpm-store
          pnpm --version

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.pnpm-store
          key:
            ${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-pnpm-store-${{ hashFiles(env.PNPM_CACHE_DEPENDENCY_PATH) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-pnpm-store-
            ${{ runner.os }}-pnpm-store-

      - name: Pull Vercel Environment Information
        env:
          CC_VERCEL_TOKEN: ${{ secrets.CC_VERCEL_TOKEN }}
        run:
          pnpm dlx vercel@${VERCEL_CLI_VERSION} pull --yes --non-interactive --environment=production
          --token=${CC_VERCEL_TOKEN}

      - name: Build Project Artifacts
        env:
          CC_VERCEL_TOKEN: ${{ secrets.CC_VERCEL_TOKEN }}
        run: pnpm dlx vercel@${VERCEL_CLI_VERSION} build --prod --token=${CC_VERCEL_TOKEN}

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        env:
          CC_VERCEL_TOKEN: ${{ secrets.CC_VERCEL_TOKEN }}
        run: |
          deploy_json="$(mktemp)"
          pnpm dlx vercel@${VERCEL_CLI_VERSION} deploy --prebuilt --prod --token=${CC_VERCEL_TOKEN} --format json > "${deploy_json}"
          deployment_url="$(node -e 'const fs=require("fs");const deployment=JSON.parse(fs.readFileSync(process.argv[1], "utf8"));const url=deployment.url; if (!url) process.exit(1); process.stdout.write(url.startsWith("http") ? url : `https://${url}`);' "${deploy_json}")"
          echo "deployment_url=${deployment_url}" >> "${GITHUB_OUTPUT}"
          echo "Production deployment: ${deployment_url}"

      - name: Smoke test deployed production routes
        env:
          CC_VERCEL_TOKEN: ${{ secrets.CC_VERCEL_TOKEN }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        run: |
          for path in / /blog /privacy-policy; do
            status="$(pnpm dlx vercel@${VERCEL_CLI_VERSION} curl "${path}" --deployment "${DEPLOYMENT_URL}" --token=${CC_VERCEL_TOKEN} -- --location --silent --show-error --output /dev/null --write-out '%{http_code}')"
            echo "${path} -> ${status}"
            if [ "${status}" != "200" ]; then
              exit 1
            fi
          done
